version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: teamcc-admin-db
    environment:
      POSTGRES_USER: teamcc_admin
      POSTGRES_PASSWORD: teamcc_admin_dev_password
      POSTGRES_DB: teamcc_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamcc_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
